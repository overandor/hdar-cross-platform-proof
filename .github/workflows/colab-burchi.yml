name: HDAR Colab Host B (Burchi)

on:
  workflow_dispatch:
    inputs:
      google_email:
        description: 'Optional Google account email override; defaults to GOOGLE_EMAIL secret'
        required: false
        default: ''

jobs:
  # ─── Job 1: macOS — Burchi drives Colab via WKWebView ───
  colab-burchi:
    name: Burchi → Colab (macOS)
    runs-on: macos-14
    env:
      GOOGLE_EMAIL: ${{ secrets.GOOGLE_EMAIL }}
      GOOGLE_PASSWORD: ${{ secrets.GOOGLE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install cryptography requests Pillow

      - name: Build release bundle
        run: |
          python3 release.py build --out /tmp/hdar_release_build
          python3 release.py verify /tmp/hdar_release_build/release_bundle.tar.gz
          mkdir -p /tmp/release_extracted
          tar xzf /tmp/hdar_release_build/release_bundle.tar.gz -C /tmp/release_extracted

      - name: Build Burchi from source
        run: |
          git clone https://github.com/overandor/burchi.git /tmp/burchi
          cd /tmp/burchi
          swift build -c release
          cp .build/release/burchi /tmp/burchi-bin
          echo "Burchi built: $(/tmp/burchi-bin --help 2>&1 | head -1)"

      - name: Determine Google credentials
        id: creds
        run: |
          EMAIL="${{ github.event.inputs.google_email }}"
          if [ -z "$EMAIL" ]; then
            EMAIL="$GOOGLE_EMAIL"
          fi
          if [ -z "$EMAIL" ] || [ -z "$GOOGLE_PASSWORD" ]; then
            echo "ERROR: Google credentials not provided. Set GOOGLE_EMAIL and GOOGLE_PASSWORD secrets."
            exit 1
          fi
          echo "email=$EMAIL" >> $GITHUB_OUTPUT

      - name: Run Burchi Colab driver (with log capture)
        run: |
          python3 colab_burchi_driver.py \
            --burchi /tmp/burchi-bin \
            --runner /tmp/release_extracted/host_a/run_host_b.py \
            --google-email "${{ steps.creds.outputs.email }}" \
            --google-password "$GOOGLE_PASSWORD" \
            --out evidence/colab \
            --timeout 600 2>&1 | tee evidence/colab_run.log

      - name: Extract tunnel URL and fetch evidence
        run: |
          TUNNEL_URL=$(python3 -c "
          import json, re
          with open('evidence/colab/burchi_raw_result.json') as f:
              data = json.load(f)
          raw = json.dumps(data)
          match = re.search(r'HDAR_TUNNEL_URL=(https?://[^\s\"]+)', raw)
          if match:
              print(match.group(1))
          ")
          if [ -z "$TUNNEL_URL" ]; then
            echo "No tunnel URL found in Burchi output. Trying raw file mode..."
            python3 evidence_fetcher.py \
              --raw-file evidence/colab/burchi_raw_result.json \
              --out evidence/colab \
              --timeout 600
          else
            echo "Tunnel URL: $TUNNEL_URL"
            python3 evidence_fetcher.py \
              --tunnel-url "$TUNNEL_URL" \
              --out evidence/colab \
              --timeout 600
          fi

      - name: Render log screenshots
        run: |
          mkdir -p evidence/colab/screenshots
          python3 render_log_screenshots.py --input evidence/colab_run.log --out-dir evidence/colab/screenshots --prefix colab_run
          if [ -f evidence/colab/evidence_fetch.log ]; then
            python3 render_log_screenshots.py --input evidence/colab/evidence_fetch.log --out-dir evidence/colab/screenshots --prefix colab_fetch
          fi

      - name: Generate attestation manifest
        run: |
          python3 -c "
          import json, hashlib, os, platform
          from datetime import datetime, timezone
          attestation = {
            'schema': 'hdar.ci-attestation/v1.0',
            'generated_utc': datetime.now(timezone.utc).isoformat(),
            'github_run_id': os.environ.get('GITHUB_RUN_ID', ''),
            'github_run_number': os.environ.get('GITHUB_RUN_NUMBER', ''),
            'github_sha': os.environ.get('GITHUB_SHA', ''),
            'github_ref': os.environ.get('GITHUB_REF', ''),
            'github_actor': os.environ.get('GITHUB_ACTOR', ''),
            'runner_os': platform.platform(),
            'runner_hostname': platform.node(),
            'workflow': os.environ.get('GITHUB_WORKFLOW', ''),
            'job': os.environ.get('GITHUB_JOB', ''),
            'colab_provider': 'google-colab',
            'browser_automation': 'burchi-wkwebview',
            'evidence_files': [],
          }
          for root, dirs, files in os.walk('evidence/colab'):
            for fn in files:
              p = os.path.join(root, fn)
              if os.path.isfile(p):
                h = hashlib.sha256(open(p,'rb').read()).hexdigest()
                attestation['evidence_files'].append({'path': p, 'sha256': h, 'size': os.path.getsize(p)})
          with open('evidence/colab/attestation.json','w') as f:
            json.dump(attestation, f, indent=2)
          print(f'Attestation: {len(attestation["evidence_files"])} files fingerprinted')
          "

      - name: Upload Colab evidence
        uses: actions/upload-artifact@v4
        with:
          name: colab-burchi-evidence
          path: |
            evidence/colab/
            evidence/colab_run.log
          retention-days: 90

  # ─── Job 2: Linux — verify the evidence ───
  verify-colab:
    name: Verify Colab evidence (Linux)
    runs-on: ubuntu-latest
    needs: colab-burchi
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install cryptography

      - name: Download Colab evidence
        uses: actions/download-artifact@v4
        with:
          name: colab-burchi-evidence
          path: evidence/colab/

      - name: Verify Colab evidence
        run: |
          ls -la evidence/colab/
          if [ ! -f evidence/colab/host_b_report.json ]; then
            echo "FATAL: host_b_report.json not found in evidence"
            exit 1
          fi
          python3 verify_all.py \
            --host-a-dir . \
            --host-b-report evidence/colab/host_b_report.json \
            --e2-capsule evidence/colab/capsule_epoch_2

      - name: Check platform separation
        run: |
          python3 -c "
          import json
          with open('evidence/colab/host_b_report.json') as f:
              report = json.load(f)
          platform = report.get('host_b_identity', {}).get('platform', '')
          hostname = report.get('host_b_identity', {}).get('machine_hostname', '')
          print(f'Colab platform: {platform}')
          print(f'Colab hostname: {hostname}')
          if 'Linux' not in platform:
              print('WARNING: Expected Linux platform from Colab')
          "

      - name: Upload verification report
        uses: actions/upload-artifact@v4
        with:
          name: colab-verification-report
          path: |
            evidence/colab/
            verifier_report_latest.json
          retention-days: 90
